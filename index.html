<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=device-height">
    <title>Kneipentour</title>
    <!--TODO: fix-->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative m-0 p-0" id="body">
    <!--background gradient-->
    <div class="fixed inset-0 -z-20" style="background: linear-gradient(to bottom, #7ED9C8 0%, #1E4E59 100%);"></div>
    <!--background clouds-->
    <div class="
        absolute top-0 left-0 -z-10 w-full
        -translate-y-8
        md:-translate-y-16
        clouds
    ">
        <img
            src="pics/clouds.svg"
            alt=""
            class="w-full"
        />
    </div>

    <!--elements containing actual content-->
    <div class="relative z-10">
        <div class="flex justify-end p-4">
            <button id="lang-button" class="
                bg-transparent
                border-2 border-solid
                rounded
                px-6 py-3
                text-lg font-semibold
                cursor-pointer
            " style="border-color: #F29441; color: #F29441; font-family: 'Kimberley', sans-serif;">...</button>
        </div>

        <!--Title svg-->
        <div class="flex justify-center mt-4 w-3/4 mx-auto">
            <img src="pics/title.svg" alt="Title" class="w-3/4"/>
        </div>

        <div class="divider"></div>
    
        <!--actual html content-->
        <div class="mx-auto w-3/4 text-center" style="color: #C9F2E7; font-family: 'KimberleyBl-Regular', sans-serif;" id="lang-text"></div>
    
        <div class="generic-divider"></div>

        <div class="mx-auto w-[50%]">
            <img src="pics/bar-rotations.svg" alt="">
        </div>

        <div class="generic-divider"></div>
    </div>

    <!-- background city -->
    <div class="w-full overflow-hidden" style="height: 39vw;">
        <img src="pics/city.svg" alt="" class="w-full" />
    </div>

    <!--Scripts-->
    <script src="script/main.js"></script>

    <!--Manages language of actual html text-->
    <script src="script/translations.js"></script>
</body>
<style>
    html {
        height: 100%;
    }
    body {
        min-height: 100%;
    }
    @font-face {
        font-family: 'KimberleyBl-Regular';
        src: url('fonts/Kimberley.otf') format('opentype');
    }
    /*I despise css*/
    @media (orientation: landscape) {
        .clouds {
            transform: translateY(-9vw);
        }
        .divider {
            height: 19.5vw;
        }
        #lang-text {
            font-size: 2rem;
        }
        .generic-divider {
            height: 5vw;
        }
    }
    @media (orientation: portrait) {
        .clouds {
            transform: translateY(-2vw);
        }
        .divider {
            height: 11vw;
        }
        #lang-text {
            font-size: 2rem;
        }
        .generic-divider {
            height: 3vw;
        }
    }
    /*Make scrollbar vanish (no one needs that thing anyway)*/
    body::-webkit-scrollbar {
        display: none;
    }
    * {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    a {
        color: #F29441;
    }
    a:visited {
        color: #1E4E59;
    }
</style>
</html>
