<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kneipentour</title>
    <!--TODO: fix-->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative m-0 p-0" id="body">
    <!--background gradient-->
    <div class="absolute inset-0 -z-20" style="background: linear-gradient(to bottom, #7ED9C8  0%, #1E4E59 100%); min-height: 100%;"></div>
    <!-- background city -->
    <div class="absolute bottom-0 left-0 w-full -z-10 city-div">
        <img src="pics/city.svg" alt="" class="w-full" />
    </div>
    <!--background clouds-->
    <div class="
        absolute top-0 left-0 -z-10 w-full
        -translate-y-8
        md:-translate-y-16
        clouds
    ">
        <img
            src="pics/clouds.svg"
            alt=""
            class="w-full"
        />
    </div>

    <!--elements containing actual content-->
    <div class="relative z-10">
        <div class="flex justify-end p-4">
            <button id="lang-button" class="
                bg-transparent
                border-2 border-solid
                rounded
                px-6 py-3
                text-lg font-semibold
                cursor-pointer
            " style="border-color: #F29441; color: #F29441; font-family: 'Kimberley', sans-serif;">...</button>
        </div>

        <!--Title svg-->
        <div class="flex justify-center mt-4">
            <img src="pics/title.svg" alt="Title" class="w-3/4"/>
        </div>

        <div class="divider"></div>
    
        <!--actual html content-->
        <div class="mx-auto w-3/4" style="color: #C9F2E7; font-family: 'KimberleyBl-Regular', sans-serif;" id="lang-text"></div>
    
        <div class="second-divider"></div>

        <div class="mx-auto w-[81%]">
            <img src="pics/bar-rotations.svg" alt="">
        </div>
    </div>


    <!--Scripts-->

    <!--Manages language of actual html text-->
    <script src="script/translations.js"></script>
</body>
<style>
    @font-face {
        font-family: 'KimberleyBl-Regular';
        src: url('fonts/Kimberley.otf') format('opentype');
    }
    body{
        min-height: 100vh;
    }
    /*I despise css*/
    /* Handies */
    @media (pointer: coarse) {
        #lang-text {
            font-size: 1.3rem;
        }
        @media (orientation: landscape) {
            .clouds {
                /*WHY DOES THIS LOOK DIFFERENT IF I REMOVE THIS?!?!?!*/
                transform: translateY(0);
            }
            body {
                min-height: 110em;
            }
            .city-div {
                overflow: hidden;
                height: 30em;
            }
            .divider {
                height: 10em;
            }
            .second-divider{
                height: 3em;
            }
        }
        /* FIXME: Wolken haben oben eine Lücke*/
        @media (orientation: portrait) {
            .clouds {
                transform: translateY(2em) scaleY(1.5);
            }
            .divider{
                height: 6em;
            }
            .second-divider{
                height: 2em;
            }
            body {
                min-height: 77em;
            }
            .city-div {
                overflow: hidden;
                height: 13em;
            }
        }
    }
    /* Computer */
    @media (pointer: fine) {
        /* You are probably here */
        @media (orientation: landscape) {
            .clouds {
                transform: translateY(-9em);
            }
            body {
                min-height: 205em;
            }
            .city-div {
                overflow: hidden;
                height: 40em;
            }
            .divider {
                height: 19.5em;
            }
            #lang-text {
                font-size: 3rem;
            }
            .second-divider{
                height: 10em;
            }
        }
        @media (orientation: portrait) {
            .clouds {
                transform: translateY(-2em);
            }
            .divider{
                height: 11em;
            }
            #lang-text {
                font-size: 2rem;
            }
            .second-divider{
                height: 3em;
            }
            body {
                min-height: 135em;
            }
            .city-div {
                overflow: hidden;
                height: 30em;
            }
        }
    }
    /*Make scrollbar vanish (no one needs that thing anyway)*/
    body::-webkit-scrollbar {
        display: none;
    }
    * {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    a {
        color: #F29441;
    }
    a:visited {
        color: #1E4E59;
    }
</style>
</html>
